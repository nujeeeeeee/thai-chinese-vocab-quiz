<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบทดสอบคำศัพท์ ไทย-จีน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Serif+Thai:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDEFE5;
    --paper-card:#F8F8F2;
    --ink:#1B2A44;
    --ink-soft:#4B5768;
    --seal:#AE3428;
    --seal-dark:#8A2A20;
    --gold:#B8912F;
    --line:#D8D8CC;
    --correct:#2F6B4F;
    --correct-bg:#E4EFE6;
    --wrong:#AE3428;
    --wrong-bg:#F5E4E1;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      radial-gradient(circle at 10% 5%, rgba(184,145,47,0.06), transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(174,52,40,0.05), transparent 40%);
    color:var(--ink);
    font-family:'Noto Serif Thai', serif;
    -webkit-font-smoothing:antialiased;
    padding:32px 16px 80px;
  }
  .page{max-width:760px;margin:0 auto;}

  header.hero{
    text-align:center;
    padding:28px 20px 26px;
    position:relative;
  }
  .seal-mark{
    width:56px;height:56px;margin:0 auto 14px;
    border:3px solid var(--seal);
    border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-4deg);
    color:var(--seal);
    font-family:'Noto Serif SC', serif;
    font-weight:900;
    font-size:22px;
    opacity:0.9;
  }
  h1{
    font-family:'Noto Serif SC','Noto Serif Thai', serif;
    font-weight:900;
    font-size:clamp(28px, 5vw, 38px);
    margin:0 0 6px;
    letter-spacing:0.5px;
  }
  header.hero p{
    margin:0;
    color:var(--ink-soft);
    font-size:15px;
    letter-spacing:0.3px;
  }
  header.hero .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:10px;
  }

  .tabs{
    display:flex;
    gap:2px;
    border-bottom:2px solid var(--ink);
    margin:22px 0 0;
  }
  .tab-btn{
    flex:1;
    background:transparent;
    border:none;
    padding:14px 10px;
    font-family:'Noto Serif Thai', serif;
    font-weight:700;
    font-size:15px;
    color:var(--ink-soft);
    cursor:pointer;
    border-bottom:3px solid transparent;
    margin-bottom:-2px;
    transition:color .2s, border-color .2s;
  }
  .tab-btn.active{
    color:var(--seal);
    border-bottom-color:var(--seal);
  }

  .section{display:none;padding-top:22px;}
  .section.active{display:block;}

  .score-bar{
    position:sticky;
    top:12px;
    z-index:5;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:20px;
    box-shadow:0 4px 14px rgba(27,42,68,0.06);
  }
  .score-bar .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .score-bar .track{
    flex:1;
    height:6px;
    background:var(--line);
    border-radius:4px;
    overflow:hidden;
  }
  .score-bar .fill{
    height:100%;
    width:0%;
    background:var(--gold);
    transition:width .25s ease;
  }
  .score-bar .count{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink);
    min-width:52px;
    text-align:right;
  }

  .qcard{
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 16px 14px;
    margin-bottom:14px;
  }
  .qcard .stem{
    font-weight:700;
    font-size:16px;
    margin-bottom:12px;
    line-height:1.5;
  }
  .qcard .stem .qnum{
    font-family:'IBM Plex Mono', monospace;
    color:var(--gold);
    font-weight:500;
    margin-right:8px;
  }
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{
    display:flex;
    align-items:flex-start;
    gap:10px;
    text-align:left;
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    font-family:'Noto Serif Thai','Noto Serif SC', serif;
    font-size:14.5px;
    line-height:1.5;
    color:var(--ink);
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .opt:hover{border-color:var(--gold);}
  .opt .letter{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    color:var(--ink-soft);
    flex-shrink:0;
  }
  .opt.selected{
    border-color:var(--seal);
    background:#FBF1EF;
  }
  .opt.selected .letter{color:var(--seal);}
  .opt.locked{cursor:default;}
  .opt.correct{
    border-color:var(--correct);
    background:var(--correct-bg);
  }
  .opt.correct .letter{color:var(--correct);}
  .opt.incorrect{
    border-color:var(--wrong);
    background:var(--wrong-bg);
  }
  .opt.incorrect .letter{color:var(--wrong);}

  .check-btn{
    display:block;
    width:100%;
    margin:6px 0 30px;
    padding:14px;
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:8px;
    font-family:'Noto Serif Thai', serif;
    font-weight:700;
    font-size:16px;
    letter-spacing:0.5px;
    cursor:pointer;
    transition:background .2s, transform .1s;
  }
  .check-btn:hover{background:#0f1a2e;}
  .check-btn:active{transform:scale(0.99);}
  .check-btn:disabled{background:var(--ink-soft);cursor:default;}

  .stamp-wrap{
    display:flex;
    justify-content:center;
    margin:-6px 0 30px;
    min-height:0;
  }
  .stamp{
    width:150px;height:150px;
    border:5px solid var(--seal);
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:var(--seal);
    transform:rotate(-8deg) scale(0);
    opacity:0;
    font-family:'Noto Serif SC', serif;
    transition:transform .45s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  }
  .stamp.show{transform:rotate(-8deg) scale(1);opacity:0.92;}
  .stamp .big{font-size:34px;font-weight:900;line-height:1;}
  .stamp .small{font-family:'IBM Plex Mono', monospace;font-size:11px;margin-top:6px;letter-spacing:1px;}

  footer{
    text-align:center;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:1px;
    margin-top:20px;
    opacity:0.7;
  }

  @media (max-width:480px){
    .qcard .stem{font-size:15px;}
    .opt{font-size:13.5px;}
  }
</style>
</head>
<body>
<div class="page">
  <header class="hero">
    <div class="seal-mark">词</div>
    <div class="eyebrow">คำศัพท์ปริญญาบัตร · 学位词汇</div>
    <h1>แบบทดสอบคำศัพท์ ไทย - จีน</h1>
    <p>แตะเลือกคำตอบ แล้วกด "ตรวจคำตอบ" เพื่อดูผลคะแนนของแต่ละตอน</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="1">ตอนที่ 1 · ไทย → จีน</button>
    <button class="tab-btn" data-tab="2">ตอนที่ 2 · จีน → ไทย</button>
  </nav>

  <section class="section active" id="section-1">
    <div class="score-bar">
      <span class="label">ตอบแล้ว</span>
      <div class="track"><div class="fill" id="fill-1"></div></div>
      <span class="count" id="count-1">0/57</span>
    </div>
    <div class="questions" id="questions-1"></div>
    <button class="check-btn" id="check-1">ตรวจคำตอบ</button>
    <div class="stamp-wrap"><div class="stamp" id="stamp-1">
      <span class="big" id="stamp-score-1">0/57</span>
      <span class="small">ตรวจแล้ว</span>
    </div></div>
  </section>

  <section class="section" id="section-2">
    <div class="score-bar">
      <span class="label">ตอบแล้ว</span>
      <div class="track"><div class="fill" id="fill-2"></div></div>
      <span class="count" id="count-2">0/57</span>
    </div>
    <div class="questions" id="questions-2"></div>
    <button class="check-btn" id="check-2">ตรวจคำตอบ</button>
    <div class="stamp-wrap"><div class="stamp" id="stamp-2">
      <span class="big" id="stamp-score-2">0/57</span>
      <span class="small">ตรวจแล้ว</span>
    </div></div>
  </section>

  <footer>ทำจากคำศัพท์หลักสูตรปริญญาตรี ไทย-จีน ทั้งหมด 57 คำ</footer>
</div>

const LETTERS = ["ก","ข","ค","ง"];

function renderSection(key, containerId){
  const data = QUIZ[key];
  const container = document.getElementById(containerId);
  const answers = new Array(data.questions.length).fill(null);
  const checked = { done:false };

  data.questions.forEach((q, qi) => {
    const card = document.createElement("div");
    card.className = "qcard";

    const stem = document.createElement("div");
    stem.className = "stem";
    stem.innerHTML = '<span class="qnum">' + (qi+1) + '.</span>' + q.stem;
    card.appendChild(stem);

    const optsWrap = document.createElement("div");
    optsWrap.className = "options";

    q.options.forEach((optText, oi) => {
      const btn = document.createElement("button");
      btn.className = "opt";
      btn.type = "button";
      btn.innerHTML = '<span class="letter">' + LETTERS[oi] + '.</span><span>' + optText + '</span>';
      btn.addEventListener("click", () => {
        if(checked.done) return;
        answers[qi] = oi;
        [...optsWrap.children].forEach(c => c.classList.remove("selected"));
        btn.classList.add("selected");
        updateProgress();
      });
      optsWrap.appendChild(btn);
    });

    card.appendChild(optsWrap);
    container.appendChild(card);
  });

  const fillEl = document.getElementById("fill-" + key.slice(-1));
  const countEl = document.getElementById("count-" + key.slice(-1));
  const total = data.questions.length;

  function updateProgress(){
    const answered = answers.filter(a => a !== null).length;
    fillEl.style.width = (answered/total*100) + "%";
    countEl.textContent = answered + "/" + total;
  }

  const checkBtn = document.getElementById("check-" + key.slice(-1));
  checkBtn.addEventListener("click", () => {
    if(checked.done) return;
    checked.done = true;
    let score = 0;
    [...container.children].forEach((card, qi) => {
      const opts = card.querySelectorAll(".opt");
      const correctIdx = data.questions[qi].correctIndex;
      const chosenIdx = answers[qi];
      if(chosenIdx === correctIdx) score++;
      opts.forEach((o, oi) => {
        o.classList.add("locked");
        if(oi === correctIdx) o.classList.add("correct");
        else if(oi === chosenIdx) o.classList.add("incorrect");
      });
    });
    checkBtn.disabled = true;
    checkBtn.textContent = "ตรวจแล้ว";
    const stampEl = document.getElementById("stamp-" + key.slice(-1));
    document.getElementById("stamp-score-" + key.slice(-1)).textContent = score + "/" + total;
    requestAnimationFrame(() => stampEl.classList.add("show"));
    stampEl.scrollIntoView({behavior:"smooth", block:"center"});
  });
}

renderSection("section1", "questions-1");
renderSection("section2", "questions-2");

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("section-" + btn.dataset.tab).classList.add("active");
    window.scrollTo({top:0, behavior:"smooth"});
  });
});
